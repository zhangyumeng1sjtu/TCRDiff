training:
  gpu_device: 1
  batch_size: 512
  num_workers: 4
  seed: 42
  lr: 1.e-4
  weight_decay: 1.e-2
  max_epochs: 50
  warm_epochs: 1
  patience: 15
  lr_scheduler: cosine
  lr_decay_steps: 50
  lr_decay_rate: 0.5
  lr_decay_min_lr: 1.e-6
  partial_chain_prob: 0.4 # 0.0
  timestep_weighting: linear
  num_diffusion_steps: 100 # 50
  rdm_couple: True
  pretrained_model: logs/pretrained-tcr-lm/checkpoint.pt
  log_dir: logs/pretrained-tcr-dplm/

model:
  num_layers: 6
  dim_head: 32 
  num_attn_heads: 8 
  dim: 256
  dropout: 0.1
  max_seq_len: 26
  use_cdr12_features: True

data: 
  train_data_path: data/tcr/train_tcrs.csv # data/tcr/train_tcrs_rmdup.csv 
  val_data_path: data/tcr/val_tcrs.csv # data/tcr/val_tcrs_rmdup.csv
  test_data_path: data/tcr/test_tcrs.csv # data/tcr/test_tcrs_rmdup.csv
  max_cdr3_len: 25
  drop_chain_prob: 0.3 # 0.0