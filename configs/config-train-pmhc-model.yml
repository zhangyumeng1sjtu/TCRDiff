training:
  gpu_device: 1
  batch_size: 256
  num_workers: 4
  seed: 42
  lr: 2.e-4
  weight_decay: 1.e-2
  max_epochs: 50
  warm_epochs: 10
  patience: 15
  lr_scheduler: cosine
  lr_decay_steps: 50
  lr_decay_rate: 0.5
  lr_decay_min_lr: 1.e-6
  pretrained_peptide_model: logs/pretrained-peptide-lm/checkpoint.pt
  lambda_mlm: 0.05 # 0.1
  log_dir: logs/peptide-mhc-binding-finetune-2
  subset_prob: 0.3
  mlm_prob: 0.15

model:
  num_transformer_layers: 6
  transformer_attn_dim_head: 32
  transformer_attn_heads: 8
  dim_single: 256 
  dim_pairwise: 64
  pair_bias_attn_dim_head: 32
  pair_bias_attn_heads: 8
  tri_attn_dim_head: 16
  tri_attn_heads: 4
  dropout: 0.1
  max_pep_len: 26
  max_mhc_len: 175
  dim_mhc_in: 20
  pair_method: attention
  num_cnn_layers: 4

data: 
  train_data_path: data/pmhc/ba/train_pmhc_ba_data.csv
  val_data_path: data/pmhc/ba/val_pmhc_ba_data.csv
  test_data_path: data/pmhc/ba/test_pmhc_ba_data.csv
  mhc_lib_path: data/pmhc/mhc_lib.json
  max_peptide_len: 25
  max_mhc_len: 175